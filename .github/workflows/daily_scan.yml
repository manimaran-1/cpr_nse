name: Daily CPR Scanner

on:
  workflow_dispatch:
    inputs:
      universe:
        description: 'Market Universe'
        required: false
        default: 'All Segment'
        type: choice
        options:
          - All Segment
          - Total Cash Segment
          - Nifty 500
          - Nifty 200
          - Nifty 50
      interval:
        description: 'Timeframe (Interval)'
        required: false
        default: '15m'
        type: choice
        options:
          - 15m
          - 1h
          - 1d
      data_source:
        description: 'Data Fetch Method'
        required: false
        default: 'yahoo'
        type: choice
        options:
          - yahoo
          - yfinance
      close_method:
        description: 'CPR Close Baseline (Note: For 1h/1d, Standard EOD Close or LTP Bhavcopy is used; Intraday Close is routed to LTP)'
        required: false
        default: 'Official Exchange LTP (Bhavcopy)'
        type: choice
        options:
          - 'Intraday Candle Close'
          - 'Official Exchange LTP (Bhavcopy)'
          - 'Without Correction (Standard EOD Close)'
      target_session:
        description: 'CPR Target Session'
        required: false
        default: 'Next Session'
        type: choice
        options:
          - 'Current Session'
          - 'Next Session'
      include_intraday:
        description: 'Include Intraday Candles (Open/High/Low/Close/Position/Time/Volume per candle)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CPR Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: 'true'
          ONCE: '1'
          DATA_SOURCE: ${{ github.event.inputs.data_source || 'yahoo' }}
          SCAN_UNIVERSE: ${{ github.event.inputs.universe || 'All Segment' }}
          SCAN_INTERVAL: ${{ github.event.inputs.interval || '15m' }}
          CLOSE_METHOD: ${{ github.event.inputs.close_method || 'Intraday Candle Close' }}
          TARGET_SESSION: ${{ github.event.inputs.target_session || 'Next Session' }}
          INCLUDE_INTRADAY: ${{ github.event.inputs.include_intraday || 'false' }}
        run: python automation_bot.py
