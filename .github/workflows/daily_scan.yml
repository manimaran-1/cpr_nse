name: Daily CPR Scanner

on:
  workflow_dispatch:
    inputs:
      universe:
        description: 'Stock universe'
        required: false
        default: 'All Segment'
        type: choice
        options:
          - All Segment
          - Total Cash Segment
          - Nifty 500
          - Nifty 200
          - Nifty 50
      interval:
        description: 'Timeframe'
        required: false
        default: '15m'
        type: choice
        options:
          - 15m
          - 1h
          - 1d
      include_intraday:
        description: 'Include intraday candle columns (Open/High/Low/Close/Position/Time/Volume per candle)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run CPR Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_ACTIONS: 'true'
          ONCE: '1'
          DATA_SOURCE: 'yahoo'
          SCAN_UNIVERSE: ${{ github.event.inputs.universe || 'All Segment' }}
          SCAN_INTERVAL: ${{ github.event.inputs.interval || '15m' }}
          CLOSE_METHOD: 'Intraday Candle Close'
          TARGET_SESSION: 'Next Session'
          INCLUDE_INTRADAY: ${{ github.event.inputs.include_intraday || 'false' }}
        run: python automation_bot.py
